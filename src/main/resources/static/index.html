<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; color: #222; margin: 0; }
        nav { background: #f4f4f4; padding: 12px 20px; border-bottom: 1px solid #ddd; }
        nav a { margin-right: 14px; text-decoration: none; color: #333; font-weight: 600; }
        .container { padding: 20px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .card { border: 1px solid #ddd; padding: 12px; border-radius: 6px; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .ok-message { color: #1a7f37; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>
<nav>
    <a href="/index.html">Dashboard</a>
    <a href="/products.html">Products</a>
    <a href="/warehouses.html">Warehouses</a>
    <a href="/movements.html">Stock Movements</a>
</nav>

<div class="container">
    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card">
            <div>Total Products</div>
            <h2 id="totalProducts">0</h2>
        </div>
        <div class="card">
            <div>Total Warehouses</div>
            <h2 id="totalWarehouses">0</h2>
        </div>
        <div class="card">
            <div>Low Stock Count</div>
            <h2 id="lowStockCount">0</h2>
        </div>
    </div>

    <h2>Low Stock Alerts</h2>
    <div id="lowStockMessage" class="ok-message" style="display:none;">
        All products are sufficiently stocked
    </div>
    <table id="lowStockTable">
        <thead>
        <tr>
            <th>Product Name</th>
            <th>Category</th>
            <th>Quantity</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const apiBase = "http://localhost:8080";

    async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) {
            throw new Error("Request failed: " + res.status);
        }
        return res.json();
    }

    function renderLowStock(rows) {
        const tbody = document.querySelector("#lowStockTable tbody");
        tbody.innerHTML = "";
        if (rows.length === 0) {
            document.getElementById("lowStockTable").style.display = "none";
            document.getElementById("lowStockMessage").style.display = "block";
            return;
        }
        document.getElementById("lowStockTable").style.display = "table";
        document.getElementById("lowStockMessage").style.display = "none";
        rows.forEach(p => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${p.name}</td><td>${p.category ?? ""}</td><td>${p.quantity ?? 0}</td>`;
            tbody.appendChild(tr);
        });
    }

    async function loadDashboard() {
        const [products, warehouses, lowStock] = await Promise.all([
            fetchJson(`${apiBase}/api/products`),
            fetchJson(`${apiBase}/api/warehouses`),
            fetchJson(`${apiBase}/api/products/low-stock?threshold=10`)
        ]);

        document.getElementById("totalProducts").textContent = products.length;
        document.getElementById("totalWarehouses").textContent = warehouses.length;
        document.getElementById("lowStockCount").textContent = lowStock.length;
        renderLowStock(lowStock);
    }

    loadDashboard().catch(err => {
        console.error(err);
    });
</script>
</body>
</html>
