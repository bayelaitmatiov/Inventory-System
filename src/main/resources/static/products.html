<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; color: #222; margin: 0; }
        nav { background: #f4f4f4; padding: 12px 20px; border-bottom: 1px solid #ddd; }
        nav a { margin-right: 14px; text-decoration: none; color: #333; font-weight: 600; }
        .container { padding: 20px; }
        form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 16px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .buttons { display: flex; gap: 8px; align-items: center; }
        button { padding: 8px 12px; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
        .btn-submit { background: #1a7f37; }
        .btn-cancel { background: #6c757d; }
        .btn-edit { background: #0d6efd; }
        .btn-delete { background: #dc3545; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<nav>
    <a href="/index.html">Dashboard</a>
    <a href="/products.html">Products</a>
    <a href="/warehouses.html">Warehouses</a>
    <a href="/movements.html">Stock Movements</a>
</nav>

<div class="container">
    <h1>Product Management</h1>

    <form id="productForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="description" placeholder="Description">
        <input type="number" id="price" placeholder="Price" step="1">
        <input type="number" id="quantity" placeholder="Quantity" required>
        <input type="text" id="category" placeholder="Category">
        <div class="buttons">
            <button type="submit" class="btn-submit" id="submitBtn">Add Product</button>
            <button type="button" class="btn-cancel" id="cancelBtn" style="display:none;">Cancel</button>
        </div>
    </form>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>
</div>

<script>
    const apiBase = "http://localhost:8080";
    let editingId = null;

    async function fetchJson(url, options) {
        const res = await fetch(url, options);
        if (!res.ok) {
            throw new Error("Request failed: " + res.status);
        }
        return res.json();
    }

    function resetForm() {
        document.getElementById("productForm").reset();
        editingId = null;
        document.getElementById("submitBtn").textContent = "Add Product";
        document.getElementById("cancelBtn").style.display = "none";
    }

    function setEditMode(product) {
        editingId = product.id;
        document.getElementById("name").value = product.name ?? "";
        document.getElementById("description").value = product.description ?? "";
        document.getElementById("price").value = product.price ?? "";
        document.getElementById("quantity").value = product.quantity ?? "";
        document.getElementById("category").value = product.category ?? "";
        document.getElementById("submitBtn").textContent = "Update Product";
        document.getElementById("cancelBtn").style.display = "inline-block";
    }

    function renderTable(products) {
        const tbody = document.getElementById("productTable");
        tbody.innerHTML = "";
        products.forEach(p => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${p.id}</td>
                <td>${p.name ?? ""}</td>
                <td>${p.category ?? ""}</td>
                <td>${p.price ?? ""}</td>
                <td>${p.quantity ?? 0}</td>
                <td>
                    <button class="btn-edit" data-id="${p.id}">Edit</button>
                    <button class="btn-delete" data-id="${p.id}">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        tbody.querySelectorAll(".btn-edit").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = Number(btn.dataset.id);
                const product = products.find(p => p.id === id);
                if (product) {
                    setEditMode(product);
                }
            });
        });

        tbody.querySelectorAll(".btn-delete").forEach(btn => {
            btn.addEventListener("click", async () => {
                const id = Number(btn.dataset.id);
                if (confirm("Delete this product?")) {
                    await fetch(`${apiBase}/api/products/${id}`, { method: "DELETE" });
                    await loadProducts();
                    if (editingId === id) {
                        resetForm();
                    }
                }
            });
        });
    }

    async function loadProducts() {
        const products = await fetchJson(`${apiBase}/api/products`);
        renderTable(products);
    }

    document.getElementById("productForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const payload = {
            name: document.getElementById("name").value.trim(),
            description: document.getElementById("description").value.trim(),
            price: Number(document.getElementById("price").value),
            quantity: Number(document.getElementById("quantity").value),
            category: document.getElementById("category").value.trim()
        };

        if (editingId === null) {
            await fetchJson(`${apiBase}/api/products`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
        } else {
            await fetchJson(`${apiBase}/api/products/${editingId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
        }

        resetForm();
        await loadProducts();
    });

    document.getElementById("cancelBtn").addEventListener("click", () => {
        resetForm();
    });

    loadProducts().catch(err => console.error(err));
</script>
</body>
</html>
